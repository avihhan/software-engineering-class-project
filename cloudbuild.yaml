# Google Cloud Build — builds and deploys all three services to Cloud Run.
#
# Required substitutions (set via trigger or --substitutions):
#   _REGION              e.g. us-central1
#   _SERVER_URL          e.g. https://aurafit-server-746427091131.us-central1.run.app
#   _WEB_PORTAL_URL      e.g. https://aurafit-web-portal-746427091131.us-central1.run.app
#   _MOBILE_URL          e.g. https://aurafit-mobile-746427091131.us-central1.run.app
#   _SUPABASE_URL        your Supabase project URL
#   _SUPABASE_ANON_KEY   your Supabase anon/public key

steps:
  # ── 1. Build server image ──────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-server:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-server:latest"
      - "./server"

  # ── 2. Build web-portal image ──────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-web-portal:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-web-portal:latest"
      - "--build-arg"
      - "VITE_API_URL=${_SERVER_URL}"
      - "--build-arg"
      - "VITE_SUPABASE_URL=${_SUPABASE_URL}"
      - "--build-arg"
      - "VITE_SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY}"
      - "./web-portal"

  # ── 3. Build mobile image ─────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-mobile:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-mobile:latest"
      - "--build-arg"
      - "VITE_API_URL=${_SERVER_URL}"
      - "--build-arg"
      - "VITE_SUPABASE_URL=${_SUPABASE_URL}"
      - "--build-arg"
      - "VITE_SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY}"
      - "./mobile"

  # ── 4. Push all images to Artifact Registry ────────────
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-server:$COMMIT_SHA"]
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-server:latest"]
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-web-portal:$COMMIT_SHA"]
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-web-portal:latest"]
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-mobile:$COMMIT_SHA"]
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-mobile:latest"]

  # ── 5. Deploy server to Cloud Run ─────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "aurafit-server"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-server:$COMMIT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--port"
      - "8080"
      - "--allow-unauthenticated"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "5"
      - "--set-env-vars"
      - "FLASK_DEBUG=0,CORS_ORIGINS=${_WEB_PORTAL_URL},${_MOBILE_URL}"

  # ── 6. Deploy web-portal to Cloud Run ──────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "aurafit-web-portal"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-web-portal:$COMMIT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--port"
      - "8080"
      - "--allow-unauthenticated"
      - "--memory"
      - "256Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "3"

  # ── 7. Deploy mobile to Cloud Run ─────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "aurafit-mobile"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-mobile:$COMMIT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--port"
      - "8080"
      - "--allow-unauthenticated"
      - "--memory"
      - "256Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "3"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-server:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-server:latest"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-web-portal:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-web-portal:latest"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-mobile:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/aurafit/aurafit-mobile:latest"

options:
  logging: CLOUD_LOGGING_ONLY
